<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psycho Mutant Baseball</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #game {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      image-rendering: pixelated; /* the PS2 upscale */
    }
    #hud {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      font-family: 'Courier New', monospace; color: #e8e2d0; text-align: center;
      text-shadow: 2px 2px 0 #000; pointer-events: none; width: 100%;
    }
    #hud .line { margin: 2px 0; font-size: 15px; letter-spacing: 1px; }
    #hud .score { font-size: 18px; font-weight: bold; color: #ffd24a; }
    #hud .batter { color: #9fe870; }
    #hud .play { color: #ff6a5e; font-weight: bold; }
    #hud .final { color: #ffd24a; font-size: 20px; margin-top: 8px; }
    #controls {
      position: fixed; bottom: 38px; left: 50%; transform: translateX(-50%);
      font-family: 'Courier New', monospace; color: #776f8a; font-size: 13px;
      text-shadow: 1px 1px 0 #000;
    }
    #ticker {
      position: fixed; bottom: 0; left: 0; right: 0; height: 26px;
      display: flex; align-items: center; gap: 12px;
      background: rgba(6, 3, 10, 0.85); border-top: 2px solid #3a3350;
      font-family: 'Courier New', monospace; font-size: 13px;
      padding: 0 12px; z-index: 20;
    }
    #ticker .tk-chip {
      color: #ffd24a; font-weight: bold; letter-spacing: 1px; white-space: nowrap;
      text-shadow: 1px 1px 0 #000;
    }
    #ticker .tk-text { color: #b8b0cc; text-shadow: 1px 1px 0 #000; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    #ticker .tk-text.pop { animation: tickerPop 0.35s ease-out; }
    @keyframes tickerPop {
      0% { transform: translateY(14px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .hidden { display: none !important; }
    #menu {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      font-family: 'Courier New', monospace; text-align: center;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    }
    #logo {
      font-size: 54px; font-weight: bold; letter-spacing: 6px; line-height: 0.95;
      color: #ffd24a;
      text-shadow: 3px 3px 0 #a41f2b, 6px 6px 0 #12091a, 0 0 24px rgba(164,31,43,0.6);
      animation: logoWobble 3.2s ease-in-out infinite;
      user-select: none;
    }
    #logo .mid { display: block; color: #9fe870; font-size: 66px;
      text-shadow: 3px 3px 0 #3a145e, 6px 6px 0 #12091a, 0 0 24px rgba(120,60,200,0.5); }
    @keyframes logoWobble {
      0%, 100% { transform: rotate(-1.2deg) translateY(0); }
      50% { transform: rotate(1.2deg) translateY(-5px); }
    }
    #menu-items { font-size: 21px; letter-spacing: 2px; }
    .menu-item { margin: 9px 0; color: #b8b0cc; text-shadow: 2px 2px 0 #000;
      cursor: pointer; white-space: pre; }
    .menu-item.sel { color: #ffd24a; }
    .menu-item.locked { color: #5e5670; }
    .menu-item.locked.sel { color: #8a7f9e; }
    #menu-flash { min-height: 20px; font-size: 14px; color: #ff6a5e;
      text-shadow: 2px 2px 0 #000; opacity: 0; transition: opacity 0.25s; }
    #menu-flash.on { opacity: 1; }
    #menu-hint { font-size: 13px; color: #776f8a; text-shadow: 1px 1px 0 #000; }
    #postgame {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      font-family: 'Courier New', monospace; text-align: center;
      background: rgba(4, 1, 8, 0.45);
    }
    #postgame .final { font-size: 26px; color: #ffd24a; text-shadow: 3px 3px 0 #a41f2b, 5px 5px 0 #000; }
    #postgame .prompt { font-size: 15px; color: #b8b0cc; text-shadow: 2px 2px 0 #000;
      animation: promptBlink 1.2s step-end infinite; }
    @keyframes promptBlink { 50% { opacity: 0.25; } }
    #loading {
      position: fixed; inset: 0; background: #000; display: flex;
      align-items: center; justify-content: center;
      font-family: 'Courier New', monospace; font-size: 18px; color: #9fe870;
      letter-spacing: 4px;
    }
    /* ---- select screens ---- */
    .screen-title { font-size: 24px; font-weight: bold; letter-spacing: 3px; color: #ffd24a;
      text-shadow: 2px 2px 0 #a41f2b, 4px 4px 0 #000; }
    .screen-hint { font-size: 12px; color: #776f8a; text-shadow: 1px 1px 0 #000; }
    #teamselect {
      position: fixed; top: 0; right: 0; bottom: 0; width: 52vw; min-width: 400px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; font-family: 'Courier New', monospace; text-align: center;
      background: linear-gradient(270deg, rgba(4,1,8,0.82) 70%, transparent 100%);
    }
    .ts-team { font-size: 19px; color: #9fe870; text-shadow: 2px 2px 0 #000; letter-spacing: 2px; }
    .ts-team .arrow { color: #ffd24a; cursor: pointer; padding: 0 10px; }
    #ts-cards { width: 88%; }
    .card {
      border: 2px solid #3a3350; background: rgba(10,6,18,0.75); text-align: left;
      padding: 4px 10px; margin: 4px 0; cursor: pointer;
    }
    .card.sel { border-color: #ffd24a; background: rgba(30,16,40,0.85); }
    .card .nm { font-size: 14px; font-weight: bold; color: #e8e2d0; text-shadow: 1px 1px 0 #000; }
    .card.sel .nm { color: #ffd24a; }
    .card .gk { font-size: 11px; font-style: italic; color: #9a8fb8; }
    .card .st { font-size: 11px; line-height: 1.25; }
    .card .lb { color: #776f8a; margin-right: 8px; }
    .card .bar.pwr { color: #ff6a5e; } .card .bar.con { color: #9fe870; } .card .bar.cha { color: #c77dff; }
    .confirm { font-size: 17px; color: #ffd24a; text-shadow: 2px 2px 0 #000; cursor: pointer;
      animation: promptBlink 1.4s step-end infinite; }
    #fieldselect {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 22px; font-family: 'Courier New', monospace; text-align: center;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
    }
    #fs-cards { display: flex; gap: 14px; }
    .fcard {
      width: 190px; border: 2px solid #3a3350; background: rgba(10,6,18,0.82);
      padding: 12px 10px; cursor: pointer;
    }
    .fcard.sel { border-color: #ffd24a; background: rgba(30,16,40,0.9); }
    .fcard .nm { font-size: 15px; font-weight: bold; color: #e8e2d0; text-shadow: 1px 1px 0 #000; min-height: 36px; }
    .fcard.sel .nm { color: #ffd24a; }
    .fcard .gk { font-size: 11px; font-style: italic; color: #9a8fb8; min-height: 42px; margin: 6px 0; }
    .fcard .chips { display: flex; justify-content: center; gap: 4px; }
    .fcard .chip { width: 16px; height: 16px; border: 1px solid #000; display: inline-block; }
    #postgame .headline { font-size: 34px; font-weight: bold; letter-spacing: 4px; color: #9fe870;
      text-shadow: 3px 3px 0 #3a145e, 6px 6px 0 #000; }
    #postgame .headline.lose { color: #ff6a5e; text-shadow: 3px 3px 0 #5e1414, 6px 6px 0 #000; }
    #postgame.side {
      inset: auto 0 0 auto; top: 0; width: 52vw; min-width: 400px;
      background: linear-gradient(270deg, rgba(4,1,8,0.85) 70%, transparent 100%);
    }
    #postgame.side .headline { font-size: 26px; }
    table.bs { border-collapse: collapse; margin: 0 auto; font-family: 'Courier New', monospace; }
    table.bs th, table.bs td {
      border: 2px solid #3a3350; padding: 3px 12px; font-size: 15px;
      color: #b8b0cc; text-shadow: 1px 1px 0 #000; text-align: center;
    }
    table.bs th { color: #776f8a; font-size: 12px; }
    table.bs td.tm { color: #9fe870; font-weight: bold; }
    table.bs td.tot { color: #ffd24a; font-weight: bold; }
    #pg-mvp { font-size: 15px; color: #c77dff; text-shadow: 2px 2px 0 #000; letter-spacing: 1px; }
    #pg-mvp .who { color: #ffd24a; font-weight: bold; }
    #pg-buttons { display: flex; gap: 22px; justify-content: center; }
    .pg-btn {
      border: 2px solid #3a3350; background: rgba(10,6,18,0.8); padding: 6px 18px;
      font-size: 15px; letter-spacing: 2px; color: #b8b0cc; cursor: pointer;
      text-shadow: 1px 1px 0 #000;
    }
    .pg-btn:hover { border-color: #ffd24a; color: #ffd24a; }
    #options {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 24px; font-family: 'Courier New', monospace; text-align: center;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
    }
    .opt-row { font-size: 19px; letter-spacing: 2px; margin: 8px 0; color: #b8b0cc;
      text-shadow: 2px 2px 0 #000; cursor: pointer; white-space: pre; }
    .opt-row.sel { color: #ffd24a; }
    #opt-controls { font-size: 13px; color: #9a8fb8; text-shadow: 1px 1px 0 #000; line-height: 1.7; }
    #opt-controls .ctl-title { color: #9fe870; font-weight: bold; letter-spacing: 2px; margin-bottom: 2px; }
    #pitchcall {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      width: 380px; font-family: 'Courier New', monospace; text-align: center;
      border: 2px solid #3a3350; background: rgba(10, 6, 18, 0.88);
      padding: 10px 14px; z-index: 25;
    }
    #pitchcall .pc-chips { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
    #pitchcall .pc-chip {
      border: 2px solid #3a3350; padding: 2px 10px; font-size: 12px; letter-spacing: 1px;
      color: #776f8a; cursor: pointer; text-shadow: 1px 1px 0 #000;
    }
    #pitchcall .pc-chip.sel { border-color: #9fe870; color: #9fe870; }
    #pitchcall .pc-meter {
      position: relative; height: 18px; margin: 6px 0;
      background: linear-gradient(90deg, #1a1024, #3a145e 60%, #a41f2b);
      border: 2px solid #3a3350;
    }
    #pitchcall .pc-pupil {
      position: absolute; top: -2px; bottom: -2px; width: 10px; left: 10%;
      background: #ffd24a; border: 2px solid #000; box-sizing: border-box;
    }
    #pitchcall .pc-needle {
      position: absolute; top: -5px; bottom: -5px; width: 4px; left: 0;
      background: #fff; box-shadow: 2px 2px 0 #000;
    }
    #pitchcall .pc-hint { font-size: 12px; color: #b8b0cc; text-shadow: 1px 1px 0 #000; min-height: 16px; }
    #wipe {
      position: fixed; inset: 0; pointer-events: none; z-index: 40;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    #wipe .band {
      position: absolute; inset: -10% -40%;
      background: linear-gradient(100deg, transparent 15%, var(--wipe-a, #241230) 35%,
        var(--wipe-b, #4a3826) 50%, var(--wipe-a, #241230) 65%, transparent 85%);
      transform: translateX(-120%) skewX(-8deg);
    }
    #wipe.go .band { animation: wipeSweep 1.5s ease-in-out forwards; }
    @keyframes wipeSweep {
      0% { transform: translateX(-120%) skewX(-8deg); }
      45% { transform: translateX(0) skewX(-8deg); }
      55% { transform: translateX(0) skewX(-8deg); }
      100% { transform: translateX(120%) skewX(-8deg); }
    }
    #wipe .wipe-text {
      position: relative; font-family: 'Courier New', monospace; font-size: 30px;
      font-weight: bold; letter-spacing: 6px; color: #ffd24a;
      text-shadow: 3px 3px 0 #a41f2b, 5px 5px 0 #000; opacity: 0;
    }
    #wipe.go .wipe-text { animation: wipeText 1.5s ease-in-out forwards; }
    @keyframes wipeText {
      0%, 25% { opacity: 0; transform: translateY(18px); }
      45%, 60% { opacity: 1; transform: translateY(0); }
      80%, 100% { opacity: 0; transform: translateY(-14px); }
    }
    #hud .score.pulse { animation: scorePulse 0.7s ease-out; }
    @keyframes scorePulse {
      0% { transform: scale(1.35); color: #fff; }
      100% { transform: scale(1); }
    }
    #walkup {
      position: fixed; left: 20px; bottom: 96px; width: 240px;
      font-family: 'Courier New', monospace; text-align: left;
      border: 2px solid #3a3350; border-left: 6px solid #ffd24a;
      background: rgba(10, 6, 18, 0.85); padding: 8px 12px;
      transform: translateX(-130%); transition: transform 0.3s ease-out;
      z-index: 15;
    }
    #walkup.in { transform: translateX(0); }
    #walkup .wu-team { font-size: 10px; letter-spacing: 2px; color: #776f8a; text-shadow: 1px 1px 0 #000; }
    #walkup .wu-name { font-size: 16px; font-weight: bold; color: #ffd24a; text-shadow: 2px 2px 0 #000; }
    #walkup .wu-gk { font-size: 11px; font-style: italic; color: #9a8fb8; margin: 2px 0 4px; }
    #walkup .wu-st { font-size: 11px; line-height: 1.3; }
    #walkup .wu-st .lb { color: #776f8a; margin-right: 8px; }
    #walkup .wu-st .pwr { color: #ff6a5e; } #walkup .wu-st .con { color: #9fe870; } #walkup .wu-st .cha { color: #c77dff; }
    #replay-tag {
      position: fixed; top: 14px; left: 18px; z-index: 60;
      font-family: 'Courier New', monospace; font-size: 17px; font-weight: bold;
      letter-spacing: 3px; color: #ff4444; text-shadow: 2px 2px 0 #000;
      animation: promptBlink 0.9s step-end infinite;
    }
    #crt {
      position: fixed; inset: 0; pointer-events: none; z-index: 50;
      background: repeating-linear-gradient(0deg,
        rgba(0,0,0,0.22) 0px, rgba(0,0,0,0.22) 1px, transparent 1px, transparent 3px);
    }
    #crt::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.38) 100%);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud" class="hidden"></div>
  <div id="controls" class="hidden">MOVE the mouse to aim the bat — CLICK or SPACE to swing as the ball reaches the zone</div>
  <div id="menu" class="hidden">
    <div id="logo">PSYCHO<span class="mid">MUTANT</span>BASEBALL</div>
    <div id="menu-items"></div>
    <div id="menu-flash"></div>
    <div id="menu-hint">↑↓ SELECT • ENTER CONFIRM</div>
  </div>
  <div id="teamselect" class="hidden"></div>
  <div id="fieldselect" class="hidden"></div>
  <div id="options" class="hidden"></div>
  <div id="crt" class="hidden"></div>
  <div id="postgame" class="hidden">
    <div class="headline"></div>
    <div class="final"></div>
    <div id="pg-box"></div>
    <div id="pg-mvp"></div>
    <div id="pg-buttons"></div>
    <div class="prompt">R — REMATCH • ENTER — LOBBY</div>
  </div>
  <div id="loading" class="hidden">EXHUMING<span>...</span></div>
  <div id="replay-tag" class="hidden">◉ REPLAY</div>
  <div id="ticker" class="hidden"><span class="tk-chip">☠ PMB SPORTS</span><span class="tk-text"></span></div>
  <div id="walkup"></div>
  <div id="wipe"><div class="band"></div><div class="wipe-text"></div></div>
  <div id="pitchcall" class="hidden">
    <div class="pc-chips"></div>
    <div class="pc-meter"><div class="pc-pupil"></div><div class="pc-needle"></div></div>
    <div class="pc-hint"></div>
  </div>
  <script type="module" src="/src/render/main.js"></script>
</body>
</html>
